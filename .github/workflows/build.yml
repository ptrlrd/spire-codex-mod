name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build and package
        shell: bash
        run: |
          docker run --rm -v "$PWD:/work" -w /work ptrlrd/spire-codex-mod-image:latest bash -euc '
            printf "<Project><PropertyGroup><GodotPath>%s</GodotPath><Sts2Path>%s</Sts2Path></PropertyGroup></Project>\n" "$GODOT_PATH" "$STS2_PATH" > Directory.Build.props
            export DOTNET=dotnet STS2_MODS="$STS2_PATH/mods"
            bash tools/package.sh
          '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpireCodex-${{ github.sha }}
          path: dist/SpireCodex-*.zip
          if-no-files-found: error

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SpireCodex-*.zip
          generate_release_notes: true
