name: build

# Builds the mod (dll + .pck) and packages the distributable zip on a SELF-HOSTED Linux runner.
#
# .NET 9 and Godot 4.5.1 are provisioned by this workflow, so a clean/Docker runner is fine. The
# ONE thing it can't fetch is Slay the Spire 2's proprietary managed DLLs (sts2.dll, 0Harmony.dll,
# Steamworks.NET.dll) - you must put those on the runner yourself (see below).
#
# SECURITY: public repo -> never run untrusted fork PRs on a self-hosted runner. Triggers only on
# pushes you control + manual dispatch.
#
# Runner setup (one time):
#   1. Copy StS2's 3 managed DLLs onto the runner. They're platform-agnostic MSIL, so copy them
#      from your Windows install (…/Slay the Spire 2/data_sts2_windows_x86_64/) into:
#          <dir>/data_sts2_linuxbsd_x86_64/{sts2.dll,0Harmony.dll,Steamworks.NET.dll}
#      and create <dir>/mods/ . On an ephemeral/Docker runner, bake these into the runner image.
#   2. Repo Settings -> Secrets and variables -> Actions -> Variables:
#          STS2_PATH = <dir>          (e.g. /opt/sts2)
#          STS2_MODS = <dir>/mods     (e.g. /opt/sts2/mods)
#
# Tag a release: `git tag v0.1.1 && git push --tags` -> builds + publishes a GitHub Release.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Godot 4.5.1 .NET (for the .pck export)
        shell: bash
        run: |
          GODOT_DIR="$RUNNER_TEMP/godot-4.5.1"
          BIN="$GODOT_DIR/Godot_v4.5.1-stable_mono_linux_x86_64/Godot_v4.5.1-stable_mono_linux_x86_64"
          if [ ! -x "$BIN" ]; then
            mkdir -p "$GODOT_DIR"
            curl -fsSL -o "$RUNNER_TEMP/godot.zip" \
              https://github.com/godotengine/godot/releases/download/4.5.1-stable/Godot_v4.5.1-stable_mono_linux_x86_64.zip
            unzip -q -o "$RUNNER_TEMP/godot.zip" -d "$GODOT_DIR"
            chmod +x "$BIN"
          fi
          echo "GODOT_BIN=$BIN" >> "$GITHUB_ENV"

      - name: Write local build config (Godot + StS2 path)
        shell: bash
        env:
          STS2_PATH: ${{ vars.STS2_PATH }}
        run: |
          {
            echo '<Project><PropertyGroup>'
            echo "  <GodotPath>$GODOT_BIN</GodotPath>"
            [ -n "$STS2_PATH" ] && echo "  <Sts2Path>$STS2_PATH</Sts2Path>"
            echo '</PropertyGroup></Project>'
          } > Directory.Build.props

      - name: Build, export .pck, and package the zip
        shell: bash
        env:
          DOTNET: dotnet
          STS2_MODS: ${{ vars.STS2_MODS }}
        run: bash tools/package.sh

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpireCodex-${{ github.sha }}
          path: dist/SpireCodex-*.zip
          if-no-files-found: error

      - name: Publish GitHub Release (on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SpireCodex-*.zip
          generate_release_notes: true
