name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.1). Leave blank to just build."
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache MegaDot
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/megadot
          key: megadot-4.5.1-m.13-linux

      - name: Install MegaDot
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends libfontconfig1
          V=4.5.1-m.13
          DIR="$RUNNER_TEMP/megadot"
          BIN="$DIR/MegaDot_v4.5.1-stable_mono_linux.x86_64"
          if [ ! -x "$BIN" ]; then
            mkdir -p "$DIR"
            curl -fsSL -o "$RUNNER_TEMP/megadot.zip" "https://megadot.megacrit.com/$V/megadot-$V-linux-x86_64-editor-csharp.zip"
            unzip -q "$RUNNER_TEMP/megadot.zip" -x '*.debugsymbols' -d "$DIR"
            chmod +x "$BIN"
            rm -f "$RUNNER_TEMP/megadot.zip"
          fi
          echo "GODOT_PATH=$BIN" >> "$GITHUB_ENV"

      - name: Resolve version
        id: ver
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            v="v${INPUT_VERSION#v}"
          elif [[ "$REF" == refs/tags/v* ]]; then
            v="$REF_NAME"
          else
            v=""
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Stamp release version into the manifest
        if: steps.ver.outputs.version != ''
        shell: bash
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          tmp=$(mktemp)
          sed -E "s/(\"version\"[[:space:]]*:[[:space:]]*\")[^\"]*(\")/\1$V\2/" SpireCodex.json > "$tmp"
          mv "$tmp" SpireCodex.json
          grep version SpireCodex.json

      - name: Build and package
        shell: bash
        run: |
          printf '<Project><PropertyGroup><GodotPath>%s</GodotPath></PropertyGroup></Project>\n' "$GODOT_PATH" > Directory.Build.props
          DOTNET=dotnet bash tools/package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpireCodex-${{ github.sha }}
          path: dist/SpireCodex-*.zip
          if-no-files-found: error

      - name: Release
        if: steps.ver.outputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          files: dist/SpireCodex-*.zip
          generate_release_notes: true

      - name: Locate package
        if: steps.ver.outputs.version != ''
        id: pkg
        shell: bash
        run: echo "file=$(ls dist/SpireCodex-*.zip | head -n1)" >> "$GITHUB_OUTPUT"

      - name: Upload to NexusMods
        if: steps.ver.outputs.version != ''
        uses: Nexus-Mods/upload-action@v1
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_group_id: ${{ secrets.NEXUSMODS_FILE_GROUP_ID }}
          filename: ${{ steps.pkg.outputs.file }}
          version: ${{ steps.ver.outputs.version }}
