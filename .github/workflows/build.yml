name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Godot
        shell: bash
        run: |
          GODOT_DIR="$RUNNER_TEMP/godot-4.5.1"
          if [ ! -d "$GODOT_DIR/extracted" ]; then
            mkdir -p "$GODOT_DIR"
            curl -fsSL -o "$RUNNER_TEMP/godot.zip" https://github.com/godotengine/godot/releases/download/4.5.1-stable/Godot_v4.5.1-stable_mono_linux_x86_64.zip
            unzip -q -o "$RUNNER_TEMP/godot.zip" -d "$GODOT_DIR"
            touch "$GODOT_DIR/extracted"
          fi
          BIN=$(find "$GODOT_DIR" -type f -name 'Godot_v4.5.1-stable_mono_linux*' | head -1)
          chmod +x "$BIN"
          echo "GODOT_BIN=$BIN" >> "$GITHUB_ENV"

      - name: Configure paths
        shell: bash
        env:
          STS2_PATH: ${{ vars.STS2_PATH }}
        run: |
          {
            echo '<Project><PropertyGroup>'
            echo "  <GodotPath>$GODOT_BIN</GodotPath>"
            [ -n "$STS2_PATH" ] && echo "  <Sts2Path>$STS2_PATH</Sts2Path>"
            echo '</PropertyGroup></Project>'
          } > Directory.Build.props
          [ -n "$STS2_PATH" ] && echo "STS2_MODS=$STS2_PATH/mods" >> "$GITHUB_ENV"

      - name: Build and package
        shell: bash
        env:
          DOTNET: dotnet
        run: bash tools/package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpireCodex-${{ github.sha }}
          path: dist/SpireCodex-*.zip
          if-no-files-found: error

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SpireCodex-*.zip
          generate_release_notes: true
