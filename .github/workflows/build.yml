name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.1). Leave blank to just build."
        required: false

jobs:
  build:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            v="v${INPUT_VERSION#v}"
          elif [[ "$REF" == refs/tags/v* ]]; then
            v="$REF_NAME"
          else
            v=""
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Stamp release version into the manifest
        if: steps.ver.outputs.version != ''
        shell: bash
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          tmp=$(mktemp)
          sed -E "s/(\"version\"[[:space:]]*:[[:space:]]*\")[^\"]*(\")/\1$V\2/" SpireCodex.json > "$tmp"
          mv "$tmp" SpireCodex.json
          grep version SpireCodex.json

      - name: Build and package
        shell: bash
        run: |
          docker pull ptrlrd/spire-codex-mod-image:latest
          cid=$(docker create --network host -w /work ptrlrd/spire-codex-mod-image:latest bash -euc '
            printf "<Project><PropertyGroup><GodotPath>%s</GodotPath><Sts2Path>%s</Sts2Path></PropertyGroup></Project>\n" "$GODOT_PATH" "$STS2_PATH" > Directory.Build.props
            export DOTNET=dotnet STS2_MODS="$STS2_PATH/mods"
            bash tools/package.sh
          ')
          docker cp . "$cid:/work"
          docker start -a "$cid" && ok=1 || ok=0
          docker cp "$cid:/work/dist/." dist/ || true
          docker rm "$cid" >/dev/null || true
          [ "$ok" = 1 ]

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpireCodex-${{ github.sha }}
          path: dist/SpireCodex-*.zip
          if-no-files-found: error

      - name: Release
        if: steps.ver.outputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          files: dist/SpireCodex-*.zip
          generate_release_notes: true
