name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, Linux, X64]
    container:
      image: ptrlrd/spire-codex-mod-image:latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure paths
        shell: bash
        run: |
          {
            echo '<Project><PropertyGroup>'
            echo "  <GodotPath>$GODOT_PATH</GodotPath>"
            echo "  <Sts2Path>$STS2_PATH</Sts2Path>"
            echo '</PropertyGroup></Project>'
          } > Directory.Build.props
          echo "STS2_MODS=$STS2_PATH/mods" >> "$GITHUB_ENV"

      - name: Build and package
        shell: bash
        env:
          DOTNET: dotnet
        run: bash tools/package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpireCodex-${{ github.sha }}
          path: dist/SpireCodex-*.zip
          if-no-files-found: error

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SpireCodex-*.zip
          generate_release_notes: true
